<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Maison Matrix</title>
    <!-- Premium Font Engines & Cyberpunk Vector Suite -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Cormorant+Garamond:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏛️</text></svg>">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Montserrat', sans-serif; background-color: #0d0d18; color: #ffffff; overflow-x: hidden; }
        
        /* SLEEK NAVBAR */
        .contact-navbar { width: 100%; height: 80px; padding: 0 5%; display: flex; align-items: center; justify-content: space-between; background: linear-gradient(to bottom, rgba(8,8,9,0.9), transparent); }
        .back-link { color: #ffffff; text-decoration: none; font-size: 11px; font-weight: 700; letter-spacing: 2px; }
        .nav-logo { font-size: 13px; font-weight: 700; letter-spacing: 4px; }

        /* HERO LAYOUT */
        .contact-wrapper { padding: 60px 8% 100px 8%; display: flex; gap: 8%; min-height: calc(100vh - 80px); align-items: center; }
        .info-panel { flex: 1; }
        .info-panel h1 { font-size: 3rem; font-weight: 700; letter-spacing: 2px; margin-bottom: 30px; line-height: 1.2; }
        .info-panel p { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: rgba(255,255,255,0.6); margin-bottom: 40px; }

        /* CYBERPUNK CHASE-LIGHT PANEL */
        .form-panel { 
            flex: 1.2; 
            background: #0d0d18; 
            padding: 50px; 
            position: relative; 
            border-radius: 20px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); 
            overflow: hidden; /* Lasers ko card se bahar phailne se rokta hai */
        }

        /* THE MOVING NEON LINES EFFECT */
        .form-panel::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(transparent, transparent, #ff007f, #00d2ff, transparent);
            top: -25%;
            left: -25%;
            animation: laserChasing 4s linear infinite;
            z-index: 1;
        }

        /* INTERNAL BACKGROUND MASK */
        .form-panel::after {
            content: '';
            position: absolute;
            inset: 2px; /* 2px thick glowing border layout line */
            background: #0d0d18; 
            border-radius: 18px;
            z-index: 2;
        }

        /* LASER ROTATION ENGINE */
        @keyframes laserChasing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ENSURING ALL INPUTS STAY ABOVE THE BACKGROUND MASKS */
        .form-panel h2, .form-panel form {
            position: relative;
            z-index: 3; 
        }

        /* INPUT GROUPS WITH FA-ICONS */
        .form-group { position: relative; margin-bottom: 35px; display: flex; align-items: center; }
        
        .form-group i {
            position: absolute;
            left: 5px;
            color: #00d2ff; 
            font-size: 16px;
            pointer-events: none;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%; 
            padding: 12px 12px 12px 35px; 
            background: transparent; 
            border: none; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            color: #00d2ff; 
            font-family: 'Montserrat', sans-serif; 
            font-size: 14px; 
            outline: none; 
            transition: border-color 0.4s ease;
        }
        
        .form-group textarea { height: 100px; resize: none; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { 
            border-bottom: 1px solid #00d2ff; 
        }
        
        /* LABELS ALIGNED WITH VECTOR CHANNELS */
        .form-group label { 
            position: absolute; 
            top: 12px; 
            left: 35px; 
            font-size: 12px; 
            letter-spacing: 2px; 
            color: rgba(255,255,255,0.4); 
            pointer-events: none; 
            transition: all 0.4s ease; 
            text-transform: uppercase; 
        }
        
        .form-group input:focus ~ label, .form-group input:valid ~ label,
        .form-group textarea:focus ~ label, .form-group textarea:valid ~ label { 
            top: -15px; 
            left: 5px; 
            font-size: 10px; 
            color: #00d2ff; 
        }

        .form-group select { color: #00d2ff; cursor: pointer; }
        .form-group select option { background: #0d0d18; color: #00d2ff; }

        /* THE OVAL CAPSULE GLOW SUBMIT BUTTON */
        .submit-btn {
            background: transparent; 
            color: #00d2ff; 
            border: 2px solid #00d2ff; 
            padding: 15px 40px; 
            font-family: 'Montserrat', sans-serif;
            font-size: 13px; 
            font-weight: 700; 
            letter-spacing: 3px; 
            cursor: pointer; 
            text-transform: uppercase;
            border-radius: 30px; 
            transition: all 0.4s ease; 
            width: 100%; 
            margin-top: 10px;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }
        
        .submit-btn:hover { 
            background: #00d2ff; 
            color: #0d0d18; 
            box-shadow: 0 0 25px #00d2ff; 
        }
        
        #form-status { margin-top: 20px; font-size: 12px; text-align: center; letter-spacing: 1px; font-weight: 700; }
        
        @media (max-width: 900px) { 
            .contact-wrapper { flex-direction: column; gap: 50px; padding: 40px 5%; } 
            .form-panel { padding: 30px; width: 100%; } 
        }
    </style>
</head>
<body>

    <nav class="contact-navbar">
        <a href="index.html" class="back-link">← RETURN TO MAIN</a>
        <div class="nav-logo">MAISON MATRIX</div>
    </nav>

    <div class="contact-wrapper">
        <div class="info-panel">
            <h1>COMMISSION<br>YOUR VISION.</h1>
            <p>Let’s collaborate to build structures that redefine limits. Submit your project requirements, and our structural team will review the parameters for layout analysis.</p>
        </div>

        <div class="form-panel">
            <h2 style="text-align: center; color: #00d2ff; font-size: 1.8rem; letter-spacing: 4px; margin-bottom: 40px; font-weight: 700;">INQUIRY</h2>
            <form id="matrix-contact-form">
                <div class="form-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="clientName" required autocomplete="off">
                    <label for="clientName">Full Name</label>
                </div>
                <div class="form-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="clientEmail" required autocomplete="off">
                    <label for="clientEmail">Email Address</label>
                </div>
                <div class="form-group">
                    <i class="fa-solid fa-layer-group"></i>
                    <select id="projectType" required>
                        <option value="" disabled selected hidden></option>
                        <option value="Luxury Residential">Bespoke Private Estate</option>
                        <option value="Corporate HQ">Executive Office / HQ</option>
                        <option value="Commercial Hospitality">High-End Resort / Commercial</option>
                    </select>
                    <label for="projectType" style="top: -15px; font-size: 10px; left: 5px; color: #00d2ff;">Project Typology</label>
                </div>
                <div class="form-group">
                    <i class="fa-solid fa-pen-clip"></i>
                    <textarea id="projectBrief" required autocomplete="off"></textarea>
                    <label for="projectBrief">Project Brief & Parameters</label>
                </div>
                <button type="submit" class="submit-btn">Submit Brief</button>
                <div id="form-status"></div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('matrix-contact-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusDiv = document.getElementById('form-status');
            statusDiv.style.color = 'rgba(255,255,255,0.6)';
            statusDiv.innerText = 'TRANSFORMING DATA...';

            const formData = {
                name: document.getElementById('clientName').value,
                email: document.getElementById('clientEmail').value,
                typology: document.getElementById('projectType').value,
                brief: document.getElementById('projectBrief').value
            };

            try {
                const response = await fetch('http://localhost:5000/api/inquiries', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    statusDiv.style.color = '#00ffcc';
                    statusDiv.innerText = 'SUCCESSFULLY INJECTED INTO DATABASE.';
                    document.getElementById('matrix-contact-form').reset();
                } else {
                    throw new Error('Server returned an error');
                }
            } catch (error) {
                statusDiv.style.color = '#ff4a4a';
                statusDiv.innerText = 'CONNECTION FAILURE. CHECK SERVER ROUTING.';
            }
        });
    </script>
</body>
</html>
